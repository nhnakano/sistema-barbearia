<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Horário - Florek Cuts</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f5; padding: 50px 20px; color: #333; }
        .container { max-width: 450px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        h3 { text-align: center; color: #e74c3c; margin-top: 0; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #7f8c8d; font-size: 14px; }
        input[type="time"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        .btn-salvar { background-color: #2ecc71; color: white; padding: 12px; border: none; border-radius: 5px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-salvar:hover { background-color: #27ae60; }
        .btn-voltar { display: block; text-align: center; margin-top: 20px; color: #95a5a6; text-decoration: none; font-size: 14px; }
        .btn-voltar:hover { color: #34495e; }
    </style>
</head>
<body>
    <div class="container">
        <h2>✏️ Ajustar Expediente</h2>
        <h3 th:text="${horario.diaSemana}">MONDAY</h3>
        
        <form th:action="@{/salvar}" th:object="${horario}" method="post">
            <input type="hidden" th:field="*{id}" />
            
            <div class="form-group">
                <label>Hora de Abertura:</label>
                <input type="time" th:field="*{horaInicio}" required />
            </div>
            
            <div class="form-group">
                <label>Hora de Fecho:</label>
                <input type="time" th:field="*{horaFim}" required />
            </div>
            
            <button type="submit" class="btn-salvar">💾 Guardar Alterações</button>
            <a th:href="@{/painel}" class="btn-voltar">⬅️ Cancelar e Voltar</a>
        </form>
    </div>
</body>
</html>
